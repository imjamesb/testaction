name: Node CI
on: [push, pull_request]
jobs:
  node:
    name: "${{ matrix.kind }} ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: "actions/checkout@v2"

      - name: "Setup Node"
        uses: "actions/setup-node@v2"
        with:
          node-version: "14"
      
      - name: "Version"
        run: |
          echo $(git describe --abbrev=0)
